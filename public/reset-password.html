<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | EduAdapt</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="sr-announcer" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<nav class="public-nav">
  <a href="./index.html" class="nav-logo">EduAdapt</a>
  <div class="nav-links">
    <a href="./index.html">Explore</a>
    <a href="./index.html#courses">Courses</a>
  </div>
  <div class="nav-cta">
    <a href="./login.html" class="btn btn-secondary btn-sm">Log In</a>
  </div>
</nav>

<main id="main-content">
<div class="auth-page">
  <div>
    <div class="auth-card">
      <div class="auth-card-top"><span class="material-symbols-outlined">lock_reset</span></div>
      <div class="auth-card-body">

        <!-- Forgot Password Form (step 1) -->
        <div id="forgot-section">
          <h1 class="auth-title" data-i18n="auth.forgot_title">Forgot Password?</h1>
          <p class="auth-subtitle" data-i18n="auth.forgot_sub">Enter your email and we'll send you a reset link.</p>
          <div id="alert-box-forgot"></div>
          <form id="forgot-form" aria-label="Forgot password form">
            <div class="form-group">
              <label class="form-label" for="forgot-email" data-i18n="auth.email">Email Address</label>
              <input type="email" id="forgot-email" class="form-control"
                placeholder="you@example.com" required autocomplete="email" />
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="forgot-btn" data-i18n="auth.send_reset">
              Send Reset Link
            </button>
          </form>
          <div class="auth-footer-text" style="margin-top:1rem;">
            <a href="./login.html" data-i18n="auth.back_login">Back to Login</a>
          </div>
        </div>

        <!-- Reset Password Form (step 2, shown when ?token= is present) -->
        <div id="reset-section" class="hidden">
          <h1 class="auth-title" data-i18n="auth.reset_title">Set New Password</h1>
          <p class="auth-subtitle" data-i18n="auth.reset_sub">Choose a strong password with at least 8 characters.</p>
          <div id="alert-box-reset"></div>
          <form id="reset-form" aria-label="Reset password form">
            <div class="form-group">
              <label class="form-label" for="new-password" data-i18n="auth.new_pwd">New Password</label>
              <div class="password-wrapper">
                <input type="password" id="new-password" class="form-control"
                  placeholder="••••••••" required minlength="8" autocomplete="new-password" />
                <button type="button" class="password-toggle"
                  onclick="togglePassword('new-password', this)" tabindex="-1"
                  aria-label="Toggle password visibility">
                  <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="confirm-password" data-i18n="auth.confirm_pwd">Confirm New Password</label>
              <div class="password-wrapper">
                <input type="password" id="confirm-password" class="form-control"
                  placeholder="••••••••" required minlength="8" autocomplete="new-password" />
                <button type="button" class="password-toggle"
                  onclick="togglePassword('confirm-password', this)" tabindex="-1"
                  aria-label="Toggle password visibility">
                  <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="reset-btn" data-i18n="auth.reset_btn">
              Reset Password
            </button>
          </form>
          <div class="auth-footer-text" style="margin-top:1rem;">
            <a href="./login.html" data-i18n="auth.back_login">Back to Login</a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
</main>

<script src="./js/theme-lang.js"></script>
<script src="./js/auth.js"></script>
<script>
  // Detect if a token is in the URL query string
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (token) {
    document.getElementById('forgot-section').classList.add('hidden');
    document.getElementById('reset-section').classList.remove('hidden');
  }

  // ── Forgot Password (step 1) ──────────────────────────────────────────────
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('alert-box-forgot');
    const btn      = document.getElementById('forgot-btn');
    const email    = document.getElementById('forgot-email').value.trim();

    alertBox.innerHTML = '';
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const res  = await fetch('/api/auth/forgot-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email }),
      });
      const data = await res.json();
      alertBox.innerHTML = res.ok
        ? `<div class="alert alert-success"><i class="fas fa-check"></i>${data.message}</div>`
        : `<div class="alert alert-error"><i class="fas fa-triangle-exclamation"></i>${data.message}</div>`;
      btn.textContent = 'Send Reset Link';
      btn.disabled = false;
    } catch {
      alertBox.innerHTML = '<div class="alert alert-error"><i class="fas fa-triangle-exclamation"></i>Network error. Please try again.</div>';
      btn.textContent = 'Send Reset Link';
      btn.disabled = false;
    }
  });

  // ── Reset Password (step 2) ───────────────────────────────────────────────
  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox      = document.getElementById('alert-box-reset');
    const btn           = document.getElementById('reset-btn');
    const newPassword   = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    alertBox.innerHTML = '';

    if (newPassword !== confirmPassword) {
      alertBox.innerHTML = '<div class="alert alert-error"><i class="fas fa-triangle-exclamation"></i>Passwords do not match.</div>';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Resetting…';

    try {
      const res  = await fetch('/api/auth/reset-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token, newPassword, confirmPassword }),
      });
      const data = await res.json();

      if (res.ok) {
        alertBox.innerHTML = `<div class="alert alert-success"><i class="fas fa-check"></i>${data.message}</div>`;
        btn.textContent = 'Done!';
        setTimeout(() => { window.location.href = './login.html'; }, 2000);
      } else {
        alertBox.innerHTML = `<div class="alert alert-error"><i class="fas fa-triangle-exclamation"></i>${data.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    } catch {
      alertBox.innerHTML = '<div class="alert alert-error"><i class="fas fa-triangle-exclamation"></i>Network error. Please try again.</div>';
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  });
</script>
</body>
</html>
